objective:
  name: corpus_wer
  direction: minimize
constraints:
  max_trials: 4
  max_gpu_hours: 24.0
  max_consecutive_failures: 2
  protected_keys:
    - qwen3_asr_root
    - model_path
    - tokenizer_path
    - tokenizer_language
    - train_file
    - eval_file
    - language
    - train.train_scope
    - train.llm_lora
    - train.ctc_enabled
    - train.ctc_weight
    - train.ddp_backend
    - evaluation.device_map
    - evaluation.attn_implementation
    - runtime.cuda_visible_devices
  loss_metric_keys:
    - train_loss_final
  max_loss_value: 20.0
space:
  train.lr:
    type: float
    low: 3.0e-6
    high: 2.0e-5
    log: true
  train.batch_size:
    type: int
    low: 1
    high: 2
  train.grad_acc:
    type: int
    low: 4
    high: 16
  train.packing_max_seq_len:
    type: int
    low: 2048
    high: 4096
  train.save_steps:
    type: int
    low: 1000
    high: 4000
  train.eval_steps:
    type: int
    low: 1000
    high: 4000

